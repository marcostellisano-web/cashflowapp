services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # SQLite by default — file is stored at ./backend/bible.db on the host.
      # For Vercel/production, set this to a PostgreSQL URL:
      #   DATABASE_URL=postgresql://user:pass@host/dbname
      - DATABASE_URL=sqlite:///./bible.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
